<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MambaSplit Email Preview</title>
  <style>
    :root {
      --bg: #f2f7f8;
      --panel: #ffffff;
      --ink: #082e43;
      --muted: #4e6b77;
      --brand: #0d6788;
      --brand-deep: #0a4b68;
      --line: #d5e4ea;
      --danger: #a12f2f;
      --ok: #1a6f43;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 5% 10%, #e2f3f8 0%, var(--bg) 40%), var(--bg);
    }

    .layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 16px;
      grid-template-columns: 360px minmax(0, 1fr);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(8, 46, 67, 0.08);
    }

    .controls {
      padding: 16px;
      position: sticky;
      top: 16px;
      align-self: start;
    }

    .controls h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.1;
    }

    .controls p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 600;
      font-size: 13px;
    }

    input,
    textarea,
    button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-family: inherit;
      font-size: 14px;
    }

    input,
    textarea {
      padding: 10px;
      color: var(--ink);
      background: #fcfeff;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      line-height: 1.4;
    }

    button {
      margin-top: 12px;
      padding: 11px 12px;
      border: 0;
      background: linear-gradient(130deg, var(--brand-deep), var(--brand));
      color: #eefcff;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover {
      filter: brightness(1.05);
    }

    .status {
      margin-top: 10px;
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--ok);
    }

    .preview {
      display: grid;
      gap: 16px;
      grid-template-rows: auto minmax(420px, 1fr) minmax(160px, auto);
      padding: 16px;
    }

    .subject {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(140deg, #fbfeff, #f3fbff);
    }

    .subject .title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .subject .value {
      font-size: 20px;
      line-height: 1.3;
      font-weight: 700;
      word-break: break-word;
    }

    iframe {
      width: 100%;
      min-height: 420px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
    }

    pre {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fbfdff;
      overflow: auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }
    }

  </style>
</head>
<body>
  <main class="layout">
    <section class="card controls">
      <h1>Email Preview Lab</h1>
      <p>Render templates without sending any email. In local Development, bearer token is optional.</p>

      <label for="presetSelect">Preset Template</label>
      <select id="presetSelect">
        <option value="welcome">Welcome</option>
        <option value="invite">Invite</option>
        <option value="invite-declined">Invite Declined</option>
        <option value="settlement">Settlement</option>
        <option value="release-v1.2.0">Release v1.2.0</option>
      </select>

      <label for="apiBase">API Base URL</label>
      <input id="apiBase" value="" placeholder="Leave blank to use current origin" />

      <label for="bearer">Bearer Token (optional in Development)</label>
      <input id="bearer" placeholder="Paste internal/admin JWT for non-Development envs" />

      <label for="templateKey">Template Key</label>
      <input id="templateKey" value="welcome" />

      <label for="subject">Subject Override (optional)</label>
      <input id="subject" placeholder="Leave empty to use template subject" />

      <label for="model">Model JSON</label>
      <textarea id="model"></textarea>

      <button id="renderButton" type="button">Render Template</button>
      <div id="status" class="status"></div>
    </section>

    <section class="card preview">
      <div class="subject">
        <div class="title">Rendered Subject</div>
        <div id="subjectValue" class="value">(none)</div>
      </div>

      <iframe id="htmlFrame" title="HTML preview" sandbox="allow-same-origin"></iframe>
      <pre id="textBody">(text preview)</pre>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const subjectEl = document.getElementById("subjectValue");
    const textEl = document.getElementById("textBody");
    const frameEl = document.getElementById("htmlFrame");
    const renderButton = document.getElementById("renderButton");
    const presetSelectEl = document.getElementById("presetSelect");
    const templateKeyEl = document.getElementById("templateKey");
    const subjectInputEl = document.getElementById("subject");
    const modelEl = document.getElementById("model");

    const presetDefinitions = {
      welcome: {
        templateKey: "welcome",
        model: {
          firstName: "Julio",
          appLink: "http://localhost:5173"
        }
      },
      invite: {
        templateKey: "invite",
        model: {
          groupName: "Weekend Trip",
          inviterName: "Julio",
          inviteToken: "invite-token-123",
          inviteExpiresInText: "7 days left",
          inviteExpiresAtTooltip: "March 24, 2026 at 8:00 PM UTC"
        }
      },
      "invite-declined": {
        templateKey: "invite-declined",
        model: {
          groupName: "Weekend Trip",
          groupId: "11111111-1111-1111-1111-111111111111",
          inviteeName: "Ana",
          inviteeEmail: "ana@example.com",
          declinedAtDisplay: "March 18, 2026 at 8:00 PM UTC"
        }
      },
      settlement: {
        templateKey: "settlement",
        model: {
          groupName: "Weekend Trip",
          groupId: "11111111-1111-1111-1111-111111111111",
          payerName: "Ana",
          receiverName: "Julio",
          amountDisplay: "$30.00",
          settledAtDisplay: "March 16, 2026 at 1:05 AM UTC",
          expenseCountText: "1 linked expense",
          noteText: "Paid back for dinner"
        }
      }
      ,
      "release-v1.2.0": {
        templateKey: "release-v1.2.0",
        model: {
          firstName: "Julio",
          appLink: "http://localhost:5173",
          screenshotMain: "/internal/email-preview-assets/screenshotMain.png",
          screenshotGroup: "/internal/email-preview-assets/screenshotGroup.png"
        }
      }
    };

    function setStatus(message, kind) {
      statusEl.textContent = message;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function applyPreset(presetKey) {
      const preset = presetDefinitions[presetKey];
      if (!preset) {
        return;
      }

      templateKeyEl.value = preset.templateKey;
      subjectInputEl.value = "";
      modelEl.value = JSON.stringify(preset.model, null, 2);
      setStatus("Loaded " + preset.templateKey + " preset.", "");
    }

    async function renderTemplate() {
      const apiBaseInput = document.getElementById("apiBase").value.trim().replace(/\/$/, "");
      const apiBase = apiBaseInput || window.location.origin;
      const bearer = document.getElementById("bearer").value.trim();
      const templateKey = templateKeyEl.value.trim();
      const subject = subjectInputEl.value;
      const modelRaw = modelEl.value;

      if (!templateKey) {
        setStatus("Template key is required.", "error");
        return;
      }

      let model;
      try {
        model = JSON.parse(modelRaw);
      } catch (error) {
        setStatus("Model JSON is invalid.", "error");
        return;
      }

      renderButton.disabled = true;
      setStatus("Rendering...", "");

      try {
        const headers = {
          "Content-Type": "application/json"
        };

        if (bearer) {
          headers.Authorization = "Bearer " + bearer;
        }

        const response = await fetch(apiBase + "/api/v1/internal/email/render", {
          method: "POST",
          headers,
          body: JSON.stringify({
            templateKey,
            subject: subject || null,
            model
          })
        });

        const raw = await response.text();
        let payload = null;
        try {
          payload = raw ? JSON.parse(raw) : null;
        } catch (error) {
          payload = null;
        }

        if (!response.ok) {
          const message = payload && payload.message ? payload.message : ("HTTP " + response.status);
          setStatus("Render failed: " + message, "error");
          return;
        }

        subjectEl.textContent = payload.subject || "(empty subject)";
        textEl.textContent = payload.textBody || "(empty text body)";
        frameEl.srcdoc = payload.htmlBody || "<p>(empty html body)</p>";
        setStatus("Rendered successfully. No email was sent.", "ok");
      } catch (error) {
        setStatus("Network error while rendering template.", "error");
      } finally {
        renderButton.disabled = false;
      }
    }

    presetSelectEl.addEventListener("change", async () => {
      applyPreset(presetSelectEl.value);
      await renderTemplate();
    });

    renderButton.addEventListener("click", renderTemplate);
    presetSelectEl.value = "welcome";
    applyPreset("welcome");
  </script>
</body>
</html>
